repos:
  # Panache for Quarto/Markdown files (uses ruff under the hood)
  - repo: https://github.com/jolars/panache
    rev: v2.31.0
    hooks:
      - id: panache-format
        files: \.qmd$
      - id: panache-lint
        files: \.qmd$

  # Vulture for dead code detection in QMD files
  - repo: local
    hooks:
      - id: lintquarto-vulture
        name: Check unused code in QMD (vulture)
        entry: uv run lintquarto -l vulture -p
        language: system
        files: \.qmd$
        pass_filenames: true

  # Ruff for Python files AND Jupyter notebooks (native support since v0.6.0)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
